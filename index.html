<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>RESQNET AI — Offline-First Emergency Command & Survival Intelligence Center</title>
    <meta name="description" content="RESQNET AI is a premium, cinematic, national disaster command center and real-time emergency coordination platform featuring speech-to-text SOS tracking, dark Leaflet maps, and Gemini AI briefings." />
    <meta name="theme-color" content="#050816" />
  </head>
  <body class="bg-cyber-bg">
    <!-- On-screen error reporting helper for debugging -->
    <div id="error-overlay" style="display: none; position: fixed; inset: 0; background: #050816; color: #ff0055; padding: 2rem; font-family: monospace; font-size: 14px; z-index: 99999; overflow: auto; border: 4px solid #ff0055;">
      <h1 style="font-size: 20px; font-weight: bold; margin-bottom: 1rem; text-shadow: 0 0 10px rgba(255, 0, 85, 0.5);">🚨 CRITICAL RUNTIME EXCEPTION DETECTED</h1>
      <pre id="error-msg" style="white-space: pre-wrap; background: rgba(255, 0, 85, 0.05); border: 1px solid rgba(255, 0, 85, 0.2); padding: 1rem; border-radius: 4px;"></pre>
      <button onclick="window.location.reload()" style="margin-top: 1rem; background: #ff0055; color: #050816; border: none; padding: 0.5rem 1rem; font-weight: bold; cursor: pointer; border-radius: 4px;">RELOAD COMMAND CENTER</button>
    </div>
    <script>
      window.addEventListener('error', function(e) {
        document.getElementById('error-overlay').style.display = 'block';
        document.getElementById('error-msg').textContent = e.message + '\nAt: ' + e.filename + ':' + e.lineno + ':' + e.colno + '\n\nStack:\n' + (e.error ? e.error.stack : 'N/A');
      });
      window.addEventListener('unhandledrejection', function(e) {
        document.getElementById('error-overlay').style.display = 'block';
        document.getElementById('error-msg').textContent = 'Unhandled Rejection: ' + e.reason + '\n\nStack:\n' + (e.reason && e.reason.stack ? e.reason.stack : 'N/A');
      });
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
